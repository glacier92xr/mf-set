# =========================
# 代理订阅
# =========================
ProxyProvidersSet: &ProxyProvidersSet
  type: http
  proxy: DIRECT
  interval: 86400
  health-check:
    enable: true
    url: "https://www.gstatic.com/generate_204"
    interval: 600
  override:
    udp: true
    additional-prefix: ""
    skip-cert-verify: true
  exclude-filter: "(?i)(过期时间)|(剩余流量)|(TG群)|(官网)"

proxy-providers:
  # 机场名称
  sub1:
    # 机场订阅地址
    url: https://your-subscribe.example.com/sub1?token=xxxxx
    path: "./proxy_provider/sub1.yaml"
    <<: *ProxyProvidersSet
    override:
      additional-prefix: "sub1-"
    # 订阅节点的 User-Agent
    header:
      User-Agent:
        - passwall
  sub2:
    # 机场订阅地址
    url: https://your-subscribe.example.com/sub2?token=xxxxx
    path: "./proxy_provider/sub2.yaml"
    <<: *ProxyProvidersSet
    override:
      additional-prefix: "sub2-"

# =========================
# 基础配置
# =========================
mixed-port: 7890
allow-lan: true
mode: rule
ipv6: false
log-level: warning
tcp-concurrent: true

find-process-mode: strict

# =========================
# 外部控制器配置
# =========================
external-controller: 0.0.0.0:9090
secret: "1234456"

# =========================
# 配置文件管理
# =========================
profile:
  store-selected: true
  store-fake-ip: true

proxies:
  # 链式代理
  # - name: 🚀 链式出口
  #   type: socks5
  #   server:
  #   port:
  #   username:
  #   password:
  #   dialer-proxy: 🚀 香港

# =========================
# 代理组配置
# =========================

### 策略组基础配置
Select: &Select
  type: select
  url: "https://www.gstatic.com/generate_204"
  disable-udp: false
  hidden: false
  include-all: true

UrlTest: &UrlTest
  type: url-test
  url: "https://www.gstatic.com/generate_204"
  interval: 180
  lazy: true
  tolerance: 50
  timeout: 2000
  disable-udp: false
  max-failed-times: 3
  hidden: false
  include-all: true

FallBack: &FallBack
  type: fallback
  url: "https://www.gstatic.com/generate_204"
  interval: 180
  lazy: true
  timeout: 2000
  disable-udp: false
  max-failed-times: 3
  hidden: false
  include-all: true

LoadBalance: &LoadBalance
  type: load-balance
  url: "https://www.gstatic.com/generate_204"
  interval: 180
  lazy: true
  disable-udp: false
  strategy: consistent-hashing
  timeout: 2000
  max-failed-times: 3
  hidden: false
  include-all: true

### 代理列表锚点
Base-proxies: &Base-proxies
  - ⚡ 自动选择
  - 🖐️ 手动切换
  - 🚀 香港
  - 🚀 台湾
  - 🚀 日本
  - 🚀 新加坡
  - 🚀 美国
  - 🚀 其他
  # - 🚀 链式出口
  - DIRECT
  - REJECT

### 扩展代理列表（含节点选择）
Proxies-select: &Proxies-select
  - 🚀 节点选择
  - ⚡ 自动选择
  - 🖐️ 手动切换
  - 🚀 香港
  - 🚀 台湾
  - 🚀 日本
  - 🚀 新加坡
  - 🚀 美国
  - 🚀 其他
  # - 🚀 链式出口
  - DIRECT
  - REJECT

### 通用功能组配置
Function-group-config: &Function-group-config
  type: select
  proxies: *Proxies-select

proxy-groups:
  # 节点选择组
  - name: 🚀 节点选择
    type: select
    proxies: *Base-proxies

  # 自动选择组
  - name: ⚡ 自动选择
    <<: *UrlTest
    hidden: false
    filter: ^((?!(直连|DIRECT|拒绝|REJECT)).)*$

  # 手动切换组
  - name: 🖐️ 手动切换
    <<: *Select
    filter: ^((?!(直连|DIRECT|拒绝|REJECT)).)*$

  # 功能策略组
  - <<: *Function-group-config
    name: 🛑 广告拦截

  - <<: *Function-group-config
    name: 🏠 私有网络
  - <<: *Function-group-config
    name: 🎯 全球直连

  - <<: *Function-group-config
    name: 🌐 全球代理
  - <<: *Function-group-config
    name: 🐟 漏网之鱼

  # 地区节点组 - 香港
  - name: 🚀 香港
    <<: *LoadBalance
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"

  # 地区节点组 - 新加坡
  - name: 🚀 新加坡
    <<: *LoadBalance
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
    exclude-filter: "(?=.*(新加坡1|VIP1|vip1)).*$"

  # 地区节点组 - 台湾
  - name: 🚀 台湾
    <<: *FallBack
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"
    exclude-filter: "(?=.*(台湾3)).*$"

  # 地区节点组 - 日本
  - name: 🚀 日本
    <<: *FallBack
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  # 地区节点组 - 美国
  - name: 🚀 美国
    <<: *FallBack
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States)).*$"

  # 地区节点组 - 其他
  - name: 🚀 其他
    type: select
    include-all: true
    filter: "^((?!(直连|DIRECT|拒绝|REJECT|链式|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States)).)*$"

# =========================
# Geo 数据获取
# =========================
geodata-mode: true
geo-auto-update: true
geodata-loader: standard
geo-update-interval: 24
geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb

# =========================
# 规则集获取
# =========================
# 定义通用锚点
BaseHTTP: &BaseHTTP
  type: http
  interval: 86400

DomainMRS: &DomainMRS
  <<: *BaseHTTP
  format: mrs
  behavior: domain

IpcidrMRS: &IpcidrMRS
  <<: *BaseHTTP
  format: mrs
  behavior: ipcidr

DomainText: &DomainText
  <<: *BaseHTTP
  format: text
  behavior: domain

# 正式规则
rule-providers:
  fake_ip_filter:
    <<: *DomainText
    url: >-
      https://gh-proxy.com/https://raw.githubusercontent.com/DustinWin/ShellCrash/refs/heads/dev/public/fake_ip_filter.list
    path: ./rule_provider/fake_ip_filter.list

  category-ads-all:
    <<: *DomainMRS
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/category-ads-all.mrs
    path: ./rule_provider/category-ads-all.mrs

  geolocation-cn:
    <<: *DomainMRS
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/geolocation-cn.mrs
    path: ./rule_provider/geolocation-cn.mrs

  cn-domain:
    <<: *DomainMRS
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/cn.mrs
    path: ./rule_provider/cn-domain.mrs

  geolocation-!cn:
    <<: *DomainMRS
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/geolocation-!cn.mrs
    path: ./rule_provider/geolocation-!cn.mrs

  private:
    <<: *IpcidrMRS
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/private.mrs
    path: ./rule_provider/private.mrs

  cn:
    <<: *IpcidrMRS
    url: >-
      https://gh-proxy.com/https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geoip/cn.mrs
    path: ./rule_provider/cn.mrs

# =========================
# 规则
# =========================
rules:
  - DOMAIN-SUFFIX,glacier.top,DIRECT
  - DOMAIN-SUFFIX,glacier.de5.net,DIRECT
  - RULE-SET,category-ads-all,🛑 广告拦截
  - RULE-SET,private,🏠 私有网络,no-resolve
  - RULE-SET,geolocation-cn,🎯 全球直连
  - RULE-SET,cn-domain,🎯 全球直连
  - RULE-SET,cn,🎯 全球直连,no-resolve

  - RULE-SET,geolocation-!cn,🌐 全球代理,no-resolve
  - MATCH,🐟 漏网之鱼

# =========================
# TUN 强制接管模式
# =========================
tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  auto-redirect: true
  strict-route: true
  dns-hijack:
    - any:53

# =========================
# DNS 配置
# =========================
dns:
  enable: true
  prefer-h3: false
  ipv6: false
  use-hosts: true
  use-system-hosts: false
  respect-rules: true

  cache-algorithm: arc
  cache-max-size: 4096

  listen: 0.0.0.0:7874
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-ttl: 300

  fake-ip-filter:
    - rule-set:fake_ip_filter
    # 自定义域名
    - "+.glacier.top"
    - "+.glacier.de5.net"
    # 机场
    - "*.ali66mysql.com"

  # 保证直连域名只走 direct-nameserver / nameserver，不被 fallback 干扰
  direct-nameserver-follow-policy: false

  # 仅用于解析 DNS 服务器域名（防死循环）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - tls://1.1.1.1
    - tls://8.8.8.8

  # 全局默认加密 DNS
  nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query

  # 代理节点专属 DNS（核心：防解析死循环）
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query

  # fallback 仅作为保险
  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - "+.github.com"
    geosite:
      - gfw

