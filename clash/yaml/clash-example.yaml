# =========================
# Geo 数据获取
# =========================
# Geo 数据模式
# 类型：布尔值
# 说明：是否使用 geodata 模式（影响规则集格式）
# 取值：false - 使用 mmdb 格式，true - 使用 dat 格式
geodata-mode: false

# Geo 数据自动更新
# 类型：布尔值
# 默认值：true
geo-auto-update: true

# Geo 数据加载器
# 类型：字符串
# 取值：
#   - standard：标准加载器
#   - memconsize：内存优化加载器
#   - acu：自适应更新加载器
geodata-loader: standard

# Geo 数据更新间隔
# 类型：整数
# 单位：小时
geo-update-interval: 24

# Geo 数据下载 URL
# 说明：指定 GeoIP、GeoSite 等数据文件的下载地址
geox-url:
  # GeoIP 数据库
  # 用途：IP 地理位置查询
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  # GeoSite 数据库
  # 用途：域名分类查询
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  # 国家/地区 MMDB
  # 用途：更精确的 IP 地理位置
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  # ASN 数据库
  # 用途：IP 自治系统号查询
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb

# =========================
# 规则集获取
# =========================
# 规则集提供程序模板定义
# 用于定义可复用的规则集配置模板
rule-providers-anchor:
  # HTTP 基础模板
  BaseHTTP: &BaseHTTP
    # 提供者类型
    # 类型：字符串
    # 取值：http（从远程 URL 获取）
    type: http
    # 自动更新间隔
    # 类型：整数
    # 单位：秒
    interval: 86400

  # 域名规则模板（MRS 格式）
  DomainMRS: &DomainMRS
    <<: *BaseHTTP
    # 规则集格式
    # 类型：字符串
    # 取值：mrs, yaml, text
    format: mrs
    # 规则行为
    # 类型：字符串
    # 取值：
    #   - domain：域名匹配
    #   - ipcidr：IP 段匹配
    #   - classical：经典格式
    behavior: domain

  # IP CIDR 规则模板（MRS 格式）
  IpcidrMRS: &IpcidrMRS
    <<: *BaseHTTP
    format: mrs
    behavior: ipcidr

  # 域名规则模板（YAML 格式）
  DomainYaml: &DomainYaml
    <<: *BaseHTTP
    format: yaml
    behavior: domain

  # 经典规则模板（YAML 格式）
  ClassicalYaml: &ClassicalYaml
    <<: *BaseHTTP
    format: yaml
