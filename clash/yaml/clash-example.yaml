# =============================================================================
# Clash (mihomo) 配置文件
# =============================================================================
# 文件用途：Clash 核心代理规则的完整配置文件，用于配置代理订阅、代理组、规则集和 DNS 等
# 适用版本：MetaCubeX/mihomo 内核 (兼容 Clash.Meta)
# 配置文件关联：
#   - proxy_provider/：代理节点提供者文件目录
#   - rule_provider/：规则集文件目录
#   - ui/：Web UI 面板文件目录
# 核心功能：
#   1. 代理订阅管理 - 从远程订阅获取代理节点
#   2. 代理组配置 - 组合和管理多个代理策略
#   3. 规则路由 - 基于域名、IP 等条件分流流量
#   4. DNS 解析 - 域名解析和 FakeIP 管理
#   5. TUN 模式 - 强制接管系统流量
# =============================================================================

# =========================
# 代理订阅
# =========================
# proxy-providers：代理节点提供者，用于从远程 URL 获取代理节点列表
# 核心属性：
#   - url：订阅地址（支持 HTTP/HTTPS）
#   - path：本地存储路径
#   - interval：自动更新间隔（秒）
#   - health-check：节点健康检测配置
#   - override：节点属性覆盖设置
# 依赖关系：需确保网络可达性，建议配合代理中转或使用 gh-proxy 等镜像
ProxyProvidersSet: &ProxyProvidersSet
  type: http
  proxy: DIRECT
  interval: 86400
  health-check:
    enable: true
    url: "https://www.gstatic.com/generate_204"
    interval: 600
  override:
    udp: true
    additional-prefix: ""
    skip-cert-verify: true
  exclude-filter: "(?i)(过期时间)|(剩余流量)|(TG群)|(官网)"

proxy-providers:
  # 代理提供者名称，可自定义
  # 机场名称
  sub1:
    # 机场订阅地址
    # 类型：字符串
    # 格式：完整的 HTTPS URL
    # 注意：建议添加 token 参数进行认证
    url: https://your-subscribe.example.com/sub1?token=xxxxx
    # 本地存储路径
    # 类型：字符串
    # 说明：相对路径，相对于配置文件所在目录
    path: "./proxy_provider/sub1.yaml"
    <<: *ProxyProvidersSet
    # 节点前缀覆盖，用于区分不同订阅的节点
    override:
      additional-prefix: "sub1-"
    # 订阅请求头
    # 类型：键值对
    # 用途：模拟不同客户端的请求特征
    # 常见值：v2rayN、Clash Verge、shadowrocket 等
    header:
      User-Agent:
        - v2rayN
  # 第二个代理订阅
  sub2:
    # 机场订阅地址
    url: https://your-subscribe.example.com/sub2?token=xxxxx
    path: "./proxy_provider/sub2.yaml"
    <<: *ProxyProvidersSet
    override:
      additional-prefix: "sub2-"
      # dialer-proxy：强制使用指定代理进行订阅请求
      # 类型：字符串
      # 用途：当订阅地址需要代理才能访问时使用
      dialer-proxy: 🌉 前置节点
    header:
      User-Agent:
        - clash-verge/v2.4.7

# =========================
# 基础配置
# =========================
# 混合代理端口，同时支持 HTTP/SOCKS/SOCKS5 协议
# 类型：整数
# 取值范围：1-65535
# 默认值：无（必须指定）
# 示例：7890
# 注意：此端口将同时提供 HTTP 和 SOCKS 代理服务
mixed-port: 7890

# 允许其他设备经过 Clash 的代理端口访问互联网
# 类型：布尔值
# 取值：true - 允许，false - 仅本机使用
# 默认值：false
# 用途：让局域网内其他设备也能使用代理
allow-lan: true

# 绑定 IP 地址，仅作用于 allow-lan 为 true
# 类型：字符串
# 取值：
#   - "*"：绑定所有地址（推荐）
#   - "127.0.0.1"：仅本机
#   - "192.168.1.1"：绑定到指定网卡
# 默认值："*"
bind-address: "*"

# Clash 路由工作模式
# 类型：字符串
# 取值：
#   - rule：基于规则的数据包路由（推荐）
#   - global：所有数据包将被转发到单个节点
#   - direct：直接将数据包转发到互联网
# 默认值：rule
mode: rule

# 开启 IPv6 总开关
# 类型：布尔值
# 取值：true - 开启，false - 关闭
# 默认值：false
# 说明：关闭时阻断所有 IPv6 连接和屏蔽 DNS 请求 AAAA 记录
ipv6: false

# Clash 内核输出日志的等级
# 类型：字符串
# 取值：silent/error/warning/info/debug
# 默认值：info
# 说明：仅在控制台和控制页面输出，生产环境建议使用 warning
log-level: warning

# TCP 并发模式
# 类型：布尔值
# 取值：true - 启用，false - 禁用
# 默认值：false
# 说明：启用后可提高 TCP 连接性能
tcp-concurrent: true

# 统一延迟优化
# 类型：布尔值
# 取值：true - 启用，false - 禁用
# 默认值：false
# 说明：减少测速时的延迟抖动
unified-delay: true

# 进程匹配模式
# 类型：字符串
# 取值：
#   - always：强制匹配所有进程
#   - strict：默认，由 mihomo 判断是否开启
#   - off：不匹配进程（推荐在路由器上使用）
# 默认值：off
find-process-mode: off
## TCP Keep Alive 设置
## TCP Keep Alive 包的间隔，单位为秒
#keep-alive-interval: 15
## TCP Keep Alive 的最大空闲时间
# keep-alive-idle: 15

# http(s)/socks/mixed代理的用户验证
#authentication:
#  - "user1:pass1"
#  - "user2:pass2"

# =========================
# 外部控制器配置
# =========================
# 外部 Web UI 面板目录
# 类型：字符串
# 说明：本地 UI 目录或远程 ZIP 包 URL
# 远程示例：https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip
external-ui: ui

# 外部 UI 名称
# 类型：字符串
# 说明：指定使用哪个 UI 包
external-ui-name: zashboard

# 外部 UI 下载 URL
# 类型：字符串
# 说明：自动下载并解压 UI 包
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip

# 外部控制器监听地址
# 类型：字符串
# 格式：IP:端口
# 用途：提供 RESTful API 供外部工具调用（如 Clash for Windows、Clash Verge 等）
# 注意：生产环境建议限制访问 IP 或添加认证
external-controller: 0.0.0.0:9090

# 外部控制器 CORS 跨域配置
# 类型：对象
# 用途：允许跨域访问 API
external-controller-cors:
  # 允许的来源
  # 类型：数组
  # 取值："*" 允许所有，或具体的域名列表
  allow-origins:
    - "*"
  # 允许私有网络访问
  # 类型：布尔值
  # 用途：允许局域网设备访问面板
  allow-private-network: true

# API 认证密钥
# 类型：字符串
# 用途：用于保护 API 访问安全
# 警告：建议修改为强密码，并妥善保管
secret: "F5Z3wWf5ToP6QLjz"

# 外部DNS服务器
# external-doh-server: /dns-query

# =========================
# TUN 强制接管模式
# =========================
# TUN 设备配置
# 用途：在系统层面创建一个虚拟网卡，强制接管所有流量
# 注意：需要管理员/root 权限启用
tun:
  # 是否启用 TUN 模式
  # 类型：布尔值
  # 取值：true - 启用，false - 禁用
  # 默认值：false
  # 说明：启用后将强制接管系统流量，无需手动配置代理
  enable: true

  # TUN 栈类型
  # 类型：字符串
  # 取值：
  #   - system：使用系统 TUN 栈（推荐）
  #   - gvisor：使用 Go 实现的虚拟 TUN 栈
  #   - mixed：混合模式，自动选择最优方案
  # 默认值：system
  stack: mixed

  # 自动配置路由表
  # 类型：布尔值
  # 取值：true - 自动配置，false - 手动配置
  # 说明：自动将 0.0.0.0/0 和 ::/0 路由到 TUN 设备
  auto-route: true

  # 自动检测出口网卡
  # 类型：布尔值
  # 取值：true - 自动检测，false - 手动指定
  # 说明：自动检测真实网卡，确保代理流量正常发出
  auto-detect-interface: true

  # 自动重定向配置
  # 类型：布尔值
  # 取值：true - 启用，false - 禁用
  # 默认值：false
  # 说明：与 auto-route 配合使用，控制流量重定向方式
  auto-redirect: false

  # DNS 劫持
  # 类型：数组
  # 格式：协议://地址:端口
  # 用途：强制劫持 DNS 请求到 Clash DNS
  # 示例：tcp://any:53 表示劫持所有 TCP 53 端口 DNS 请求
  dns-hijack:
    - tcp://any:53
    - udp://any:53

  # GSO (Generic Segmentation Offload) 特性
  # 类型：布尔值
  # 取值：true - 启用，false - 禁用
  # 默认值：false
  # 说明：可提升大文件传输性能，但部分系统可能不兼容
  # gso: false

  # GSO 最大包大小
  # 类型：整数
  # 单位：字节
  # 默认值：65536
  # gso-max-size: 65536

# =========================
# DNS 配置
# =========================
# DNS 服务器配置
# 核心功能：域名解析、DNS 劫持、FakeIP 管理
# 依赖关系：TUN 模式下的 dns-hijack 需要配合此处配置
dns:
  # 是否启用 DNS 功能
  # 类型：布尔值
  # 取值：true - 启用，false - 禁用
  # 默认值：false
  # 说明：启用后 Clash 将接管 DNS 解析
  enable: true

  # 优先使用 HTTP/3 (QUIC) 进行 DNS 查询
  # 类型：布尔值
  # 取值：true - 启用，false - 禁用
  # 默认值：false
  # 说明：可提高 DNS 查询速度和可靠性
  prefer-h3: false

  # 是否启用 IPv6 DNS 解析
  # 类型：布尔值
  # 取值：true - 启用，false - 禁用
  # 默认值：false
  # 说明：启用后才会解析 AAAA 记录
  ipv6: false

  # 使用 /etc/hosts 文件
  # 类型：布尔值
  # 取值：true - 使用，false - 不使用
  # 默认值：false
  # 说明：启用后将读取系统 hosts 文件
  use-hosts: true

  # 使用系统 hosts
  # 类型：布尔值
  # 取值：true - 使用，false - 不使用
  # 默认值：false
  use-system-hosts: false

  # 遵守规则中的 DNS 设置
  # 类型：布尔值
  # 取值：true - 遵守，false - 忽略
  # 默认值：false
  # 说明：启用后规则中的 DNS 设置将生效
  respect-rules: true

  # DNS 缓存算法
  # 类型：字符串
  # 取值：
  #   - arc：自适应缓存（推荐，性能更好）
  #   - false：禁用缓存
  # 默认值：arc
  cache-algorithm: arc

  # DNS 缓存最大条目数
  # 类型：整数
  # 默认值：4096
  # 说明：缓存过多会导致内存占用增加
  cache-max-size: 4096

  # DNS 监听地址
  # 类型：字符串
  # 格式：IP:端口
  # 说明：供本地程序使用 DNS 解析
  listen: 0.0.0.0:7874

  # DNS 增强模式
  # 类型：字符串
  # 取值：
  #   - fake-ip：返回伪造的 IP 地址，适用于代理模式（推荐）
  #   - redir-host：重定向到 DNS 服务器
  #   - normal：正常解析
  # 默认值：fake-ip
  enhanced-mode: fake-ip

  # Fake IP 地址池范围
  # 类型：CIDR 格式字符串
  # 默认值：198.18.0.1/16
  # 说明：用于 fake-ip 模式下分配的伪造 IP 段
  # 注意：不应与内网网段冲突
  fake-ip-range: 198.18.0.1/16

  # Fake IP 过滤模式
  # 类型：字符串
  # 取值：
  #   - blacklist：黑名单模式，仅对 fake-ip-filter 中的域名返回 FakeIP
  #   - whitelist：白名单模式，除 fake-ip-filter 中的域名外都返回 FakeIP
  # 默认值：blacklist
  fake-ip-filter-mode: blacklist

  # Fake IP 缓存 TTL
  # 类型：整数
  # 单位：秒
  # 默认值：300
  # 说明：FakeIP 缓存的有效时间
  fake-ip-ttl: 300

  # Fake IP 过滤列表
  # 类型：数组
  # 说明：指定哪些域名不使用 FakeIP
  # 支持 geosite:xxx 语法引用规则集
  fake-ip-filter:
    - rule-set:fake-ip-filter
    - rule-set:glacier
    - rule-set:category-public-tracker
    - geosite:cn

  # 代理节点 DNS 解析跟随策略
  # 类型：布尔值
  # 默认值：false
  direct-nameserver-follow-policy: false

  # 默认 DNS 服务器
  # 类型：数组
  # 说明：用于解析默认域名，必须返回真实 IP
  # 推荐使用支持 DoT (DNS over TLS) 的服务器
  default-nameserver:
    - tls://1.12.12.12:853
    - tls://223.5.5.5:853
    - tls://1.1.1.1:853
    - tls://8.8.8.8:853

  # 主要 DNS 服务器
  # 类型：数组
  # 说明：用于解析常规域名，按顺序尝试
  # 支持 DoH (DNS over HTTPS) 协议
  nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query

  # 代理 DNS 服务器
  # 类型：数组
  # 说明：通过代理服务器转发 DNS 请求
  # 用于解析被墙域名
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query

  # 备用 DNS 服务器
  # 类型：数组
  # 说明：当主要 DNS 服务器不可用时使用
  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query

  # 备用 DNS 过滤配置
  # 类型：对象
  # 说明：控制备用 DNS 的使用条件
  fallback-filter:
    # 仅对 geoip 范围内的 IP 使用备用 DNS
    # 类型：布尔值
    # 默认值：true
    geoip: true
    # GeoIP 代码
    # 类型：字符串
    # 默认值：CN
    # 说明：排除中国 IP 使用备用 DNS
    geoip-code: CN
    # IP CIDR 过滤列表
    # 类型：数组
    # 说明：这些 IP 段不使用备用 DNS
    ipcidr:
      - ::/128
      - ::1/128
      - 2001::/32
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.88.99.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 255.255.255.255/32
    # 域名过滤列表
    # 类型：数组
    # 说明：这些域名不使用备用 DNS
    domain:
      - "+.tiktok.com"
      - "+.byteoversea.com"
      - "+.ibytedtos.com"
      - "+.github.com"
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.githubusercontent.com"
      - "+.googlevideo.com"
      - "+.msftconnecttest.com"
      - "+.msftncsi.com"
  # nameserver-policy:
  #   "geosite:cn,private,apple":
  #     - https://dns.alidns.com/dns-query#h3=true
  #     - https://doh.pub/dns-query
  #   "rule-set:geolocation-!cn":
  #     - https://dns.cloudflare.com/dns-query
  #     - https://dns.google/dns-query
  #   "rule-set:category-ads-all": rcode://success

# =========================
# 配置文件管理
# =========================
# 运行数据持久化配置
# 用途：保存和恢复代理选择状态
profile:
  # 保存选中的代理节点
  # 类型：布尔值
  # 取值：true - 保存，false - 不保存
  # 说明：重启后自动恢复上次选择的代理
  store-selected: true

  # 保存 Fake IP 记录
  # 类型：布尔值
  # 取值：true - 保存，false - 不保存
  # 说明：减少 DNS 解析延迟
  store-fake-ip: true

# =========================
# 代理组配置
# =========================
# 代理组锚点模板定义
# 用于定义可复用的代理组配置模板
proxy-groups-anchor:
  # 手动选择类型模板
  # 用途：允许用户手动选择代理节点
  Select: &Select
    # 代理组类型
    # 类型：字符串
    # 取值：
    #   - select：手动选择（用户自行切换节点）
    #   - url-test：自动测速选择最优节点
    #   - fallback：故障转移（按顺序尝试）
    #   - load-balance：负载均衡
    type: select
    # 健康检查 URL
    # 类型：字符串
    # 说明：用于代理组自动测速
    url: "https://www.gstatic.com/generate_204"
    # 是否禁用 UDP
    # 类型：布尔值
    # 默认值：false
    disable-udp: false
    # 是否隐藏该代理组
    # 类型：布尔值
    # 取值：true - 隐藏，false - 显示
    # 说明：隐藏后不会在 Web UI 中显示
    hidden: false
    # 包含所有代理
    # 类型：布尔值
    # 取值：true - 包含，false - 使用 proxies 指定
    # 说明：设置为 true 时自动包含所有可用节点
    include-all: true

  # URL 测试类型模板
  # 用途：自动测速选择延迟最低的节点
  UrlTest: &UrlTest
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    # 测速间隔
    # 类型：整数
    # 单位：秒
    # 默认值：300
    interval: 300
    # 懒更新模式
    # 类型：布尔值
    # 说明：仅在需要时才进行测速
    lazy: true
    # 容差值
    # 类型：整数
    # 单位：毫秒
    # 说明：当最低延迟变化在此范围内时不切换节点
    tolerance: 50
    # 测速超时时间
    # 类型：整数
    # 单位：毫秒
    timeout: 2000
    disable-udp: false
    hidden: false
    include-all: true

  # 故障回退类型模板
  # 用途：当当前节点不可用时自动切换到下一个
  FallBack: &FallBack
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: true
    timeout: 2000
    disable-udp: false
    hidden: false
    include-all: true

  # 负载均衡类型模板
  # 用途：在多个节点间分配流量
  LoadBalance: &LoadBalance
    type: load-balance
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: true
    # 负载均衡策略
    # 类型：字符串
    # 取值：
    #   - round-robin：轮询
    #   - consistent-hashing：一致性哈希（推荐）
    #   - random：随机
    strategy: consistent-hashing
    timeout: 2000
    hidden: false
    include-all: true

  # 基础代理列表
  # 类型：数组
  # 说明：定义常用的代理选项
  Base-proxies: &Base-proxies
    - ⚡ 自动选择
    - 🖐️ 手动切换
    - 🇭🇰 香港
    - 🇹🇼 台湾
    - 🇯🇵 日本
    - 🇸🇬 新加坡
    - 🇺🇸 美国
    - 🌏 其他
    - 🏠 家宽
    - DIRECT
    - REJECT

  # 功能代理选择列表
  # 类型：数组
  Proxies-select: &Proxies-select
    - 🚀 节点选择
    - ⚡ 自动选择
    - 🖐️ 手动切换
    - 🇭🇰 香港
    - 🇹🇼 台湾
    - 🇯🇵 日本
    - 🇸🇬 新加坡
    - 🇺🇸 美国
    - 🏠 家宽
    - 🌏 其他
    - DIRECT
    - REJECT

  # 功能代理组通用配置
  # 类型：对象
  # 说明：作为功能类代理组的模板
  Function-group-config: &Function-group-config
    type: select
    proxies: *Proxies-select

# 代理组列表
# 用途：定义具体的代理策略组
proxy-groups:
  # 主节点选择组
  # 用途：作为所有规则的默认出口代理
  - name: 🚀 节点选择
    # 代理组类型：select（手动选择）
    type: select
    # 包含的代理列表
    proxies: *Base-proxies

  # 前置节点配置
  # 用途：用于代理链的中间节点（如订阅下载）
  - name: 🌉 前置节点
    type: select
    proxies: *Base-proxies

  # 手动切换代理组
  # 用途：用户手动选择特定节点
  # filter：使用正则过滤包含特定关键字的节点
  - name: 🖐️ 手动切换
    <<: *Select
    filter: ^((?!(直连|DIRECT|拒绝|REJECT|链式|^(?i:nsc))).)*$

  # 自动选择代理组
  # 用途：根据延迟自动选择最优节点
  - name: ⚡ 自动选择
    <<: *UrlTest
    hidden: false
    filter: ^((?!(直连|DIRECT|拒绝|REJECT|链式|^(?i:nsc))).)*$

  # 功能代理组定义
  # 说明：这些代理组用于规则匹配，可通过 Web UI 手动指定出口
  - name: 🏠 私有网络
    <<: *Function-group-config

  - name: 🛑 广告拦截
    <<: *Function-group-config

  - name: 🔗 public-tracker
    <<: *Function-group-config

  - name: 🎵 TikTok
    <<: *Function-group-config

  - name: 🤖 AI 服务
    <<: *Function-group-config

  - name: 📺 油管视频
    <<: *Function-group-config

  - name: 🔍 谷歌服务
    <<: *Function-group-config

  - name: 💬 电报消息
    <<: *Function-group-config

  - name: 🐱 Github
    <<: *Function-group-config

  - name: 🪟 微软服务
    <<: *Function-group-config

  - name: 🍏 苹果服务
    <<: *Function-group-config

  - name: 📱 社交媒体
    <<: *Function-group-config

  - name: 🎬 流媒体
    <<: *Function-group-config

  - name: 🎮 游戏平台
    <<: *Function-group-config

  - name: 📖 教育资源
    <<: *Function-group-config

  - name: 💹 金融服务
    <<: *Function-group-config

  - name: ☁️ 云服务
    <<: *Function-group-config

  - name: 🌐 全球代理
    <<: *Function-group-config

  - name: 🌍 全球直连
    <<: *Function-group-config

  - name: 🎣 漏网之鱼
    <<: *Function-group-config

  # 地区代理组
  # 说明：根据节点名称关键字进行筛选

  # 香港代理组
  # filter：正则表达式，匹配包含"香港"等关键字的节点
  - name: 🇭🇰 香港
    <<: *LoadBalance
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"

  # 新加坡代理组
  - name: 🇸🇬 新加坡
    <<: *LoadBalance
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
    # exclude-filter：排除包含这些关键字的节点
    exclude-filter: "(?=.*(新加坡1|VIP1|vip1)).*$"

  # 台湾代理组
  - name: 🇹🇼 台湾
    <<: *FallBack
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"
    exclude-filter: "(?=.*(台湾3)).*$"

  # 日本代理组
  - name: 🇯🇵 日本
    <<: *FallBack
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  # 美国代理组
  - name: 🇺🇸 美国
    <<: *FallBack
    include-all: false
    # 手动指定美国节点
    proxies:
      - 🇺🇸 美国-nsc
      - 🇺🇸 美国-zy

  # 美国直连代理组（排除 nsc）
  - name: 🇺🇸 美国-zy
    <<: *UrlTest
    include-all: true
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States)).*$"
    exclude-filter: "^(?!.*爪云)"

  # 美国 NSC 代理组
  - name: 🇺🇸 美国-nsc
    <<: *UrlTest
    include-all: true
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States)).*$"
    exclude-filter: "^(?!.*nsc)"

  # 美国其他代理组（排除爪云和 nsc）
  - name: 🇺🇸 美国-qt
    <<: *UrlTest
    include-all: true
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States)).*$"
    exclude-filter: "^.*(爪云|(?i:nsc))"

  # 家宽代理组
  - name: 🏠 家宽
    <<: *Select
    include-all: true
    filter: "(?i).*家宽.*"

  # 其他地区代理组
  - name: 🌏 其他
    type: select
    include-all: true
    filter: "^((?!(直连|DIRECT|拒绝|REJECT|链式|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States|家宽)).)*$"

# =========================
# 规则
# =========================
# 路由规则列表
# 规则格式：规则类型,匹配条件,代理组,选项
# 规则按顺序匹配，从上到下依次执行
# no-resolve：表示只匹配域名，不进行 DNS 解析
rules:
  # 拦截 IPv6 地址
  # 规则类型：IP-CIDR6
  # 用途：阻断所有 IPv6 流量，防止 IPv6 泄露
  - IP-CIDR6,::/0,REJECT,no-resolve

  # 私有规则集
  # RULE-SET：引用外部规则集文件
  # 说明：根据规则集内容匹配域名/IP
  - RULE-SET,glacier,🌍 全球直连
  - RULE-SET,private-ip,🏠 私有网络,no-resolve

  # 广告拦截规则
  - RULE-SET,category-ads-all,🛑 广告拦截

  # 公共 tracker 拦截
  - RULE-SET,category-public-tracker,🔗 public-tracker

  # TikTok QUIC 阻断
  # SUB-RULE：子规则定义
  # 用途：阻断 QUIC 协议，防止移动端 DNS 泄露
  - SUB-RULE,(OR,((RULE-SET,tiktok),(RULE-SET,bytedance@!cn))),drop-quic
  - RULE-SET,tiktok,🎵 TikTok,no-resolve
  - RULE-SET,bytedance@!cn,🎵 TikTok,no-resolve

  # AI 服务规则
  - RULE-SET,google-gemini,🤖 AI 服务,no-resolve
  - RULE-SET,openai,🤖 AI 服务,no-resolve
  - RULE-SET,anthropic,🤖 AI 服务,no-resolve
  - RULE-SET,category-ai-!cn,🤖 AI 服务,no-resolve

  # 视频和搜索引擎规则
  - RULE-SET,youtube,📺 油管视频
  - RULE-SET,google,🔍 谷歌服务,no-resolve
  - RULE-SET,google-ip,🔍 谷歌服务,no-resolve

  # 代码托管规则
  - RULE-SET,github,🐱 Github
  - RULE-SET,gitlab,🐱 Github

  # 微软和苹果服务规则
  - RULE-SET,microsoft,🪟 微软服务
  - RULE-SET,apple,🍏 苹果服务

  # 即时通讯规则
  - RULE-SET,telegram,💬 电报消息,no-resolve
  - RULE-SET,telegram-ip,💬 电报消息,no-resolve

  # 社交媒体规则（海外）
  - RULE-SET,category-social-media-!cn,📱 社交媒体

  # 流媒体规则
  - RULE-SET,netflix,🎬 流媒体
  - RULE-SET,hulu,🎬 流媒体
  - RULE-SET,disney,🎬 流媒体
  - RULE-SET,hbo,🎬 流媒体
  - RULE-SET,amazon,🎬 流媒体
  - RULE-SET,bahamut,🎬 流媒体

  # 游戏平台规则
  - RULE-SET,steam,🎮 游戏平台
  - RULE-SET,epicgames,🎮 游戏平台
  - RULE-SET,ea,🎮 游戏平台
  - RULE-SET,ubisoft,🎮 游戏平台
  - RULE-SET,blizzard,🎮 游戏平台

  # 教育资源规则
  - RULE-SET,coursera,📖 教育资源
  - RULE-SET,edx,📖 教育资源
  - RULE-SET,udemy,📖 教育资源
  - RULE-SET,khanacademy,📖 教育资源
  - RULE-SET,category-scholar-!cn,📖 教育资源

  # 金融服务规则
  - RULE-SET,paypal,💹 金融服务
  - RULE-SET,visa,💹 金融服务
  - RULE-SET,mastercard,💹 金融服务
  - RULE-SET,stripe,💹 金融服务
  - RULE-SET,wise,💹 金融服务

  # 云服务规则
  - RULE-SET,aws,☁️ 云服务
  - RULE-SET,azure,☁️ 云服务
  - RULE-SET,digitalocean,☁️ 云服务
  - RULE-SET,heroku,☁️ 云服务
  - RULE-SET,dropbox,☁️ 云服务

  # 全球代理和直连规则
  # geolocation-!cn：非中国地区的域名
  - RULE-SET,geolocation-!cn,🌐 全球代理

  # 中国规则直连
  # cn：国内域名
  # cn-ip：国内 IP 段
  - RULE-SET,cn,🌍 全球直连
  - RULE-SET,cn-ip,🌍 全球直连,no-resolve

  # 漏网之鱼规则
  # MATCH：兜底规则，匹配所有未命中上述规则的流量
  - MATCH,🎣 漏网之鱼

# 子规则定义
# 用途：定义可被规则引用的子规则集合
# 说明：用于封装复杂的规则逻辑
sub-rules:
  # drop-quic：阻断 QUIC 协议
  # 用途：防止移动端通过 QUIC 协议绕过代理
  drop-quic:
    # 彻底阻断 QUIC/UDP，防止移动端穿透
    # 规则类型：AND（并且）
    # NETWORK,UDP：网络协议为 UDP
    # DST-PORT,443：目标端口为 443
    - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
    # 增加针对端口 80 的 UDP 阻断 (防止部分客户端探测)
    - AND,((NETWORK,UDP),(DST-PORT,80)),REJECT

# NTP 时间同步配置
# 用途：保持系统时间准确（部分平台需要）
ntp:
  # 是否启用 NTP
  # 类型：布尔值
  # 默认值：false
  enable: true

  # 写入系统时间
  # 类型：布尔值
  # 说明：是否将获取的时间写入系统
  write-to-system: true

  # NTP 服务器地址
  # 类型：字符串
  # 推荐：time.apple.com, time.windows.com, pool.ntp.org
  server: time.apple.com

  # NTP 端口
  # 类型：整数
  # 默认值：123
  port: 123

  # 同步间隔
  # 类型：整数
  # 单位：秒
  interval: 30

# 域名嗅探配置
# 用途：自动识别流量目标域名，用于规则匹配
sniffer:
  # 是否启用嗅探
  # 类型：布尔值
  # 默认值：false
  # 说明：启用后可提高基于域名的规则匹配精度
  enable: true

  # 覆盖目标地址
  # 类型：布尔值
  # 说明：使用嗅探到的域名替换原始目标地址
  override-destination: true

  # 嗅探配置
  # 说明：指定需要嗅探的协议类型和端口
  sniff:
    # QUIC 协议嗅探
    QUIC:
      ports:
        - 443
    # TLS 协议嗅探
    TLS:
      ports:
        - 443
        - 8443
    # HTTP 协议嗅探
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true

  # 强制嗅探域名列表
  # 类型：数组
  # 说明：即使未匹配 sniff 端口也强制进行域名嗅探
  force-domain:
    - "+.tiktok.com"
    - "+.byteoversea.com"
    - "+.ibytedtos.com"
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"

  # 跳过嗅探域名列表
  # 类型：数组
  # 说明：这些域名不进行嗅探，直接放行
  skip-domain:
    # 小米 IoT 设备
    - Mijia Cloud
    # 小米账号
    - dlg.io.mi.com
    # 花生壳内网穿透
    - "+.oray.com"
    # 向日葵远程控制
    - "+.sunlogin.net"
    # Apple 推送服务
    - "+.push.apple.com"
    # 本地网络域名
    - "+.lan"
    - "+.local"
    - "+.localdomain"
    # 华硕路由器
    - router.asus.com
    # TP-Link
    - tplogin.cn
    # 腾达
    - tendawifi.com
    # 小米路由器
    - miwifi.com

  # 解析纯 IP 请求
  # 类型：布尔值
  # 说明：启用后会对纯 IP 请求进行域名解析
  parse-pure-ip: true

# =========================
# 流量入站
# 端口监听配置（可选）
# 例如：
#  - Steam 强制美区
#  - TikTok 强制台湾
#  - ChatGPT 强制美国
# =========================
# listeners：自定义入站监听器
# 用途：创建多个端口监听，每个端口可绑定不同的代理策略
# 常见场景：实现不同应用/网站走不同节点
listeners:
  # 监听器名称
  # 类型：字符串
  # 说明：用于标识该监听器
  - name: mixed-in-1
    # 监听器类型
    # 类型：字符串
    # 取值：mixed（同时支持 HTTP/SOCKS）
    type: mixed
    # 监听地址
    # 类型：字符串
    # 说明：0.0.0.0 表示监听所有网卡
    listen: 0.0.0.0
    # 监听端口
    # 类型：整数
    # 用途：代理服务端口
    port: 10811
    # 绑定代理
    # 类型：字符串
    # 说明：该端口的流量强制走指定代理
    proxy: 🇸🇬 新加坡
    # 启用 UDP
    # 类型：布尔值
    # 说明：是否支持 UDP 转发
    udp: true

  - name: mixed-in-2
    type: mixed
    listen: 0.0.0.0
    port: 10812
    proxy: 🇭🇰 香港
    udp: true

  - name: mixed-in-3
    type: mixed
    listen: 0.0.0.0
    port: 10813
    proxy: 🇹🇼 台湾
    udp: true

  - name: mixed-in-4
    type: mixed
    listen: 0.0.0.0
    port: 10814
    proxy: 🏠 家宽
    udp: true

  - name: mixed-in-5
    type: mixed
    listen: 0.0.0.0
    port: 10815
    proxy: 🇺🇸 美国
    udp: true

