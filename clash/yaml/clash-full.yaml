BaseHTTP: &BaseHTTP
  type: http
  interval: 86400

DomainMRS: &DomainMRS
  <<: *BaseHTTP
  format: mrs
  behavior: domain

IpcidrMRS: &IpcidrMRS
  <<: *BaseHTTP
  format: mrs
  behavior: ipcidr

DomainText: &DomainText
  <<: *BaseHTTP
  format: text
  behavior: domain

