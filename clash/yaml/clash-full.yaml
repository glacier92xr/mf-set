# =========================
# 代理订阅
# =========================
ProxyProvidersSet: &ProxyProvidersSet
  type: http
  proxy: DIRECT
  interval: 86400
  health-check:
    enable: true
    url: "https://www.gstatic.com/generate_204"
    interval: 600
  override:
    udp: true
    additional-prefix: ""
    skip-cert-verify: true
  exclude-filter: "(?i)(过期时间)|(剩余流量)|(TG群)|(官网)"

proxy-providers:
  # 机场名称
  sub1:
    # 机场订阅地址
    url: https://your-subscribe.example.com/sub1?token=xxxxx
    path: "./proxy_provider/sub1.yaml"
    <<: *ProxyProvidersSet
    override:
      additional-prefix: "sub1-"
    # 订阅节点的 User-Agent
    header:
      User-Agent:
        - passwall
  sub2:
    # 机场订阅地址
    url: https://your-subscribe.example.com/sub2?token=xxxxx
    path: "./proxy_provider/sub2.yaml"
    <<: *ProxyProvidersSet
    override:
      additional-prefix: "sub2-"

# =========================
# 基础配置
# =========================
mixed-port: 7890
allow-lan: true
mode: rule
ipv6: false
log-level: warning
tcp-concurrent: true

find-process-mode: strict

# =========================
# 外部控制器配置
# =========================
external-controller: 0.0.0.0:9090
secret: "1234456"

# =========================
# 配置文件管理
# =========================
profile:
  store-selected: true
  store-fake-ip: true

proxies:
  # 链式代理
  # - name: 🚀 链式出口
  #   type: socks5
  #   server:
  #   port:
  #   username:
  #   password:
  #   dialer-proxy: 🚀 香港

# =========================
# 代理组配置
# =========================

### 策略组基础配置
Select: &Select
  type: select
  url: "https://www.gstatic.com/generate_204"
  disable-udp: false
  hidden: false
  include-all: true

UrlTest: &UrlTest
  type: url-test
  url: "https://www.gstatic.com/generate_204"
  interval: 180
  lazy: true
  tolerance: 50
  timeout: 2000
  disable-udp: false
  max-failed-times: 3
  hidden: false
  include-all: true

FallBack: &FallBack
  type: fallback
  url: "https://www.gstatic.com/generate_204"
  interval: 180
  lazy: true
  timeout: 2000
  disable-udp: false
  max-failed-times: 3
  hidden: false
  include-all: true

LoadBalance: &LoadBalance
  type: load-balance
  url: "https://www.gstatic.com/generate_204"
  interval: 180
  lazy: true
  disable-udp: false
  strategy: consistent-hashing
  timeout: 2000
  max-failed-times: 3
  hidden: false
  include-all: true

### 代理列表锚点
Base-proxies: &Base-proxies
  - ⚡ 自动选择
  - 🖐️ 手动切换
  - 🚀 香港
  - 🚀 台湾
  - 🚀 日本
  - 🚀 新加坡
  - 🚀 美国
  - 🚀 其他
  # - 🚀 链式出口
  - DIRECT
  - REJECT

### 扩展代理列表（含节点选择）
Proxies-select: &Proxies-select
  - 🚀 节点选择
  - ⚡ 自动选择
  - 🖐️ 手动切换
  - 🚀 香港
  - 🚀 台湾
  - 🚀 日本
  - 🚀 新加坡
  - 🚀 美国
  - 🚀 其他
  # - 🚀 链式出口
  - DIRECT
  - REJECT

### 通用功能组配置
Function-group-config: &Function-group-config
  type: select
  proxies: *Proxies-select

proxy-groups:
  # 节点选择组
  - name: 🚀 节点选择
    type: select
    proxies: *Base-proxies

  # 自动选择组
  - name: ⚡ 自动选择
    <<: *UrlTest
    hidden: false
    filter: ^((?!(直连|DIRECT|拒绝|REJECT)).)*$

  # 手动切换组
  - name: 🖐️ 手动切换
    <<: *Select
    filter: ^((?!(直连|DIRECT|拒绝|REJECT)).)*$

  # 功能策略组
  - <<: *Function-group-config
    name: 🛑 广告拦截

  - <<: *Function-group-config
    name: 🏠 私有网络
  - <<: *Function-group-config
    name: 🎯 全球直连

  - <<: *Function-group-config
    name: 💬 AI 服务
  - <<: *Function-group-config
    name: 📹 油管视频
  - <<: *Function-group-config
    name: 🔍 谷歌服务
  - <<: *Function-group-config
    name: 📲 电报消息
  - <<: *Function-group-config
    name: 🐱 Github
  - <<: *Function-group-config
    name: Ⓜ️ 微软服务
  - <<: *Function-group-config
    name: 🍏 苹果服务
  - <<: *Function-group-config
    name: 🌐 TikTok
  - <<: *Function-group-config
    name: 🌐 社交媒体
  - <<: *Function-group-config
    name: 🎬 流媒体
  - <<: *Function-group-config
    name: 🎮 游戏平台
  - <<: *Function-group-config
    name: 📚 教育资源
  - <<: *Function-group-config
    name: 💰 金融服务
  - <<: *Function-group-config
    name: ☁️ 云服务
  - <<: *Function-group-config
    name: 🌐 全球代理
  - <<: *Function-group-config
    name: 🐟 漏网之鱼

  # 地区节点组 - 香港
  - name: 🚀 香港
    <<: *LoadBalance
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"

  # 地区节点组 - 新加坡
  - name: 🚀 新加坡
    <<: *LoadBalance
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
    exclude-filter: "(?=.*(新加坡1|VIP1|vip1)).*$"

  # 地区节点组 - 台湾
  - name: 🚀 台湾
    <<: *FallBack
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"
    exclude-filter: "(?=.*(台湾3)).*$"

  # 地区节点组 - 日本
  - name: 🚀 日本
    <<: *FallBack
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"

  # 地区节点组 - 美国
  - name: 🚀 美国
    <<: *FallBack
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States)).*$"

  # 地区节点组 - 其他
  - name: 🚀 其他
    type: select
    include-all: true
    filter: "^((?!(直连|DIRECT|拒绝|REJECT|链式|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States)).)*$"

# =========================
# Geo 数据获取
# =========================
geodata-mode: true
geo-auto-update: true
geodata-loader: standard
geo-update-interval: 24
geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb

