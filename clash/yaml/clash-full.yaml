# =========================
# TUN 强制接管模式
# =========================
tun:
  enable: false
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  auto-redirect: true
  strict-route: true
  dns-hijack:
    - any:53

# =========================
# DNS 配置
# =========================
dns:
  enable: true
  prefer-h3: false
  ipv6: false
  use-hosts: true
  use-system-hosts: false
  respect-rules: true

  cache-algorithm: arc
  cache-max-size: 4096

  listen: 0.0.0.0:7874
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-ttl: 300

  fake-ip-filter:
    - rule-set:fake_ip_filter
    # 自定义域名
    - "+.glacier.top"
    - "+.glacier.de5.net"
    # 机场
    - "*.ali66mysql.com"

  # 保证直连域名只走 direct-nameserver / nameserver，不被 fallback 干扰
  direct-nameserver-follow-policy: false

  # 仅用于解析 DNS 服务器域名（防死循环）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - tls://1.1.1.1
    - tls://8.8.8.8

  # 全局默认加密 DNS
  nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query

  # 代理节点专属 DNS（核心：防解析死循环）
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query

  # fallback 仅作为保险
  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
    domain:
      - "+.github.com"
    geosite:
      - gfw

