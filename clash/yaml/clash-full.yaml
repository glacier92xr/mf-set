sub-rules:
  drop-quic:
    - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
    - AND,((NETWORK,UDP),(DST-PORT,80)),REJECT

ntp:
  enable: true
  write-to-system: true
  server: time.apple.com
  port: 123
  interval: 30

# =========================
# 域名探测
# =========================
sniffer:
  enable: true
  override-destination: true
  sniff:
    QUIC:
      ports:
        - 443
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
  force-domain:
    - "+.tiktok.com"
    - "+.byteoversea.com"
    - "+.ibytedtos.com"
    - "+.netflix.com"
    - "+.nflxvideo.net"
    - "+.amazonaws.com"
    - "+.media.dssott.com"
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - "+.oray.com"
    - "+.sunlogin.net"
    - "+.push.apple.com"
    - "+.lan"
    - "+.local"
    - "+.localdomain"
    - router.asus.com
    - tplogin.cn
    - tendawifi.com
    - miwifi.com
  parse-pure-ip: true

# =========================
# 流量入站
# 端口监听配置（可选）
# 例如：
#  - Steam 强制美区
#  - TikTok 强制台湾
#  - ChatGPT 强制美国
# =========================
listeners:
  - name: mixed-in-1
    type: mixed
    listen: 0.0.0.0
    port: 10811
    proxy: 🇸🇬 新加坡
    udp: true
  - name: mixed-in-2
    type: mixed
    listen: 0.0.0.0
    port: 10812
    proxy: 🇭🇰 香港
    udp: true
  - name: mixed-in-3
    type: mixed
    listen: 0.0.0.0
    port: 10813
    proxy: 🇹🇼 台湾
    udp: true
  - name: mixed-in-4
    type: mixed
    listen: 0.0.0.0
    port: 10814
    proxy: 🏠 家宽
    udp: true
  - name: mixed-in-5
    type: mixed
    listen: 0.0.0.0
    port: 10815
    proxy: 🇺🇸 美国
    udp: true

# =========================
# Geo 数据获取
# =========================
geodata-mode: false
geo-auto-update: true
geodata-loader: standard
geo-update-interval: 24
geox-url:
  geoip: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat
  mmdb: https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb

