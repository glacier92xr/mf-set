# =========================
# 代理订阅
# =========================
ProxyProvidersSet: &ProxyProvidersSet
  type: http
  proxy: DIRECT
  interval: 86400
  health-check:
    enable: true
    url: "https://www.gstatic.com/generate_204"
    interval: 600
  override:
    udp: true
    additional-prefix: ""
    skip-cert-verify: true
  exclude-filter: "(?i)(过期时间)|(剩余流量)|(TG群)|(官网)"

proxy-providers:
  # 机场名称
  sub1:
    # 机场订阅地址
    url: https://your-subscribe.example.com/sub1?token=xxxxx
    path: "./proxy_provider/sub1.yaml"
    <<: *ProxyProvidersSet
    override:
      additional-prefix: "sub1-"
    header:
      User-Agent:
        - v2rayN
  sub2:
    # 机场订阅地址
    url: https://your-subscribe.example.com/sub2?token=xxxxx
    path: "./proxy_provider/sub2.yaml"
    <<: *ProxyProvidersSet
    override:
      additional-prefix: "sub2-"
      dialer-proxy: 🌉 前置节点
    header:
      User-Agent:
        - clash-verge/v2.4.7

# =========================
# 基础配置
# =========================
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
ipv6: false
log-level: warning
tcp-concurrent: true
unified-delay: true
find-process-mode: off

# =========================
# 外部控制器配置
# =========================
external-ui: ui
external-ui-name: zashboard
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip
external-controller: 0.0.0.0:9090
external-controller-cors:
  allow-origins:
    - "*"
  allow-private-network: true
secret: "F5Z3wWf5ToP6QLjz"

# =========================
# TUN 强制接管模式
# =========================
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  auto-redirect: false
  dns-hijack:
    - tcp://any:53
    - udp://any:53

# =========================
# DNS 配置
# =========================
dns:
  enable: true
  prefer-h3: false
  ipv6: false
  use-hosts: true
  use-system-hosts: false
  respect-rules: true
  cache-algorithm: arc
  cache-max-size: 4096
  listen: 0.0.0.0:7874
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-ttl: 300
  fake-ip-filter:
    - rule-set:fake-ip-filter
    - rule-set:glacier
    - rule-set:category-public-tracker
    - geosite:cn
  direct-nameserver-follow-policy: false
  default-nameserver:
    - tls://1.12.12.12:853
    - tls://223.5.5.5:853
    - tls://1.1.1.1:853
    - tls://8.8.8.8:853
  nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query
  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - ::/128
      - ::1/128
      - 2001::/32
      - 0.0.0.0/8
      - 10.0.0.0/8
      - 100.64.0.0/10
      - 127.0.0.0/8
      - 169.254.0.0/16
      - 172.16.0.0/12
      - 192.0.0.0/24
      - 192.0.2.0/24
      - 192.88.99.0/24
      - 192.168.0.0/16
      - 198.18.0.0/15
      - 198.51.100.0/24
      - 203.0.113.0/24
      - 224.0.0.0/4
      - 240.0.0.0/4
      - 255.255.255.255/32
    domain:
      - "+.tiktok.com"
      - "+.byteoversea.com"
      - "+.ibytedtos.com"
      - "+.github.com"
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.githubusercontent.com"
      - "+.googlevideo.com"
      - "+.msftconnecttest.com"
      - "+.msftncsi.com"

# =========================
# 配置文件管理
# =========================
profile:
  store-selected: true
  store-fake-ip: true

# =========================
# 代理组配置
# =========================
proxy-groups-anchor:
  Select: &Select
    type: select
    url: "https://www.gstatic.com/generate_204"
    disable-udp: false
    hidden: false
    include-all: true
  UrlTest: &UrlTest
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: true
    tolerance: 50
    timeout: 2000
    disable-udp: false
    hidden: false
    include-all: true
  FallBack: &FallBack
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: true
    timeout: 2000
    disable-udp: false
    hidden: false
    include-all: true
  LoadBalance: &LoadBalance
    type: load-balance
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    lazy: true
    strategy: consistent-hashing
    timeout: 2000
    hidden: false
    include-all: true
  Base-proxies: &Base-proxies
    - ⚡ 自动选择
    - 🖐️ 手动切换
    - 🇭🇰 香港
    - 🇹🇼 台湾
    - 🇯🇵 日本
    - 🇸🇬 新加坡
    - 🇺🇸 美国
    - 🌏 其他
    - 🏠 家宽
    - DIRECT
    - REJECT
  Proxies-select: &Proxies-select
    - 🚀 节点选择
    - ⚡ 自动选择
    - 🖐️ 手动切换
    - 🇭🇰 香港
    - 🇹🇼 台湾
    - 🇯🇵 日本
    - 🇸🇬 新加坡
    - 🇺🇸 美国
    - 🏠 家宽
    - 🌏 其他
    - DIRECT
    - REJECT
  Function-group-config: &Function-group-config
    type: select
    proxies: *Proxies-select

proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies: *Base-proxies
  - name: 🌉 前置节点
    type: select
    proxies: *Base-proxies
  - name: 🖐️ 手动切换
    <<: *Select
    filter: ^((?!(直连|DIRECT|拒绝|REJECT|链式|^(?i:nsc))).)*$
  - name: ⚡ 自动选择
    <<: *UrlTest
    hidden: false
    filter: ^((?!(直连|DIRECT|拒绝|REJECT|链式|^(?i:nsc))).)*$

  - name: 🏠 私有网络
    <<: *Function-group-config
  - name: 🛑 广告拦截
    <<: *Function-group-config
  - name: 🔗 public-tracker
    <<: *Function-group-config
  - name: 🎵 TikTok
    <<: *Function-group-config
  - name: 🤖 AI 服务
    <<: *Function-group-config
  - name: 📺 油管视频
    <<: *Function-group-config
  - name: 🔍 谷歌服务
    <<: *Function-group-config
  - name: 💬 电报消息
    <<: *Function-group-config
  - name: 🐱 Github
    <<: *Function-group-config
  - name: 🪟 微软服务
    <<: *Function-group-config
  - name: 🍏 苹果服务
    <<: *Function-group-config
  - name: 📱 社交媒体
    <<: *Function-group-config
  - name: 🎬 流媒体
    <<: *Function-group-config
  - name: 🎮 游戏平台
    <<: *Function-group-config
  - name: 📖 教育资源
    <<: *Function-group-config
  - name: 💹 金融服务
    <<: *Function-group-config
  - name: ☁️ 云服务
    <<: *Function-group-config
  - name: 🌐 全球代理
    <<: *Function-group-config
  - name: 🌍 全球直连
    <<: *Function-group-config
  - name: 🎣 漏网之鱼
    <<: *Function-group-config

  - name: 🇭🇰 香港
    <<: *LoadBalance
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
  - name: 🇸🇬 新加坡
    <<: *LoadBalance
    filter: "(?=.*(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)).*$"
    exclude-filter: "(?=.*(新加坡1|VIP1|vip1)).*$"
  - name: 🇹🇼 台湾
    <<: *FallBack
    filter: "(?=.*(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)).*$"
    exclude-filter: "(?=.*(台湾3)).*$"
  - name: 🇯🇵 日本
    <<: *FallBack
    filter: "(?=.*(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)).*$"
  - name: 🇺🇸 美国
    <<: *FallBack
    include-all: false
    proxies:
      - 🇺🇸 美国-nsc
      - 🇺🇸 美国-zy
  - name: 🇺🇸 美国-zy
    <<: *UrlTest
    include-all: true
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States)).*$"
    exclude-filter: "^(?!.*爪云)"
  - name: 🇺🇸 美国-nsc
    <<: *UrlTest
    include-all: true
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States)).*$"
    exclude-filter: "^(?!.*nsc)"
  - name: 🇺🇸 美国-qt
    <<: *UrlTest
    include-all: true
    filter: "(?=.*(广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States)).*$"
    exclude-filter: "^.*(爪云|(?i:nsc))"
  - name: 🏠 家宽
    <<: *Select
    include-all: true
    filter: "(?i).*家宽.*"
  - name: 🌏 其他
    type: select
    include-all: true
    filter: "^((?!(直连|DIRECT|拒绝|REJECT|链式|广港|香港|HK|Hong Kong|🇭🇰|HongKong|广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|广新|新加坡|SG|坡|狮城|🇸🇬|Singapore|广美|US|美国|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|🇺🇸|United States|家宽)).)*$"

